name: 🐍 snake
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare output branch
        run: |
          git clone --depth 1 --branch master https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ztxtech/ztxtech.git work
          cd work
          git checkout -B output
          git config user.name "ztxtech-bot"
          git config user.email "bot@users.noreply.github.com"
          git push -u origin output --force
          cd ..
          rm -rf work

      - uses: actions/checkout@v4
        with:
          ref: output
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ztxtech
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/ocean.gif
            dist/ocean-dark.gif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit snake artifacts
        run: |
          git config user.name "ztxtech-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore(snake): regenerate contribution snake"
          git push origin output
