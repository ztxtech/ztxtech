name: 🐍 snake
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate contribution snake + ocean
        uses: Platane/snk@v3
        with:
          github_user_name: ztxtech
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/ocean.gif
            dist/ocean-dark.gif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
