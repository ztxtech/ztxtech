name: 🛰️ metrics
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ztxtech
          template: classic
          base: header
          config_timezone: Australia/Melbourne
          config_animations: yes
          config_output: svg
          filename: docs/github-metrics.svg
          plugin_languages: yes
          plugin_habits: yes
          plugin_followup: yes
          plugin_topics: yes
          plugin_lines: yes
          plugin_repositories: yes
          plugin_achievements: yes
          plugin_isocalendar: yes
          optimize: yes
          setup_community_templates: classic
          use_prebuilt_image: yes

      - name: Commit metrics svg
        run: |
          git config user.name "ztxtech-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash origin master || true
          git add docs/github-metrics.svg
          git diff --staged --quiet || git commit -m "chore(metrics): refresh github-metrics.svg"
          git push
