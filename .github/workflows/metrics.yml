name: 🛰️ metrics
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metrics SVG (auto-commits to repo)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: master
          committer_message: "chore(metrics): refresh github-metrics.svg [skip ci]"
          user: ztxtech
          template: classic
          base: header
          config_timezone: Australia/Melbourne
          config_animations: yes
          config_output: svg
          filename: docs/github-metrics.svg
          plugin_languages: yes
          plugin_followup: yes
          plugin_topics: yes
          plugin_lines: yes
          plugin_repositories: yes
          plugin_isocalendar: yes
          optimize: yes
          use_prebuilt_image: yes
