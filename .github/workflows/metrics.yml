name: 🛰️ metrics
on:
  schedule: [{ cron: "0 */6 * * *" }]
  workflow_dispatch:
  push: { branches: [main] }

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          plugin: details
          template: classic
          config_timezone: Australia/Melbourne
          base: header
          octicon: in
          languages: yes
          habits: yes
          activities: yes
          community: yes
          followup: yes
          topics: yes
          toggles: yes
          chart: yes
          metadata: yes
          traffic: yes
          achievements: yes
          badges: yes
          isocalendar: yes
          wakatime: no
          github: ztxtech
          generated: .github/metrics.svg
          mock: |
            { "rows": [{ "name": "agentic time series", "color": "#7C3AED" }] }
      - run: cp .github/metrics.svg github-metrics.svg
      - uses: actions/checkout@v4
      - run: |
          git config user.name "ztxtech-bot"
          git config user.email "bot@users.noreply.github.com"
          git add github-metrics.svg
          git commit -m "chore(metrics): refresh github-metrics.svg" || echo "no changes"
          git push
