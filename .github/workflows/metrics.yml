name: 🛰️ metrics
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          plugin: details
          template: classic
          config_timezone: Australia/Melbourne
          base: header
          octicon: in
          languages: yes
          habits: yes
          activities: yes
          community: yes
          followup: yes
          topics: yes
          toggles: yes
          chart: yes
          metadata: yes
          traffic: yes
          achievements: yes
          badges: yes
          isocalendar: yes
          wakatime: no
          github: ztxtech
          generated: .github/metrics.svg

      - name: Publish metrics svg
        run: |
          mkdir -p docs
          cp .github/metrics.svg docs/github-metrics.svg
          git config user.name "ztxtech-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/github-metrics.svg
          git pull --rebase --autostash origin master || true
          git diff --staged --quiet || git commit -m "chore(metrics): refresh github-metrics.svg"
          git push
