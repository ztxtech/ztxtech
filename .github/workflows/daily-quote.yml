name: 💬 daily quote
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick today's quote
        run: |
          python3 - <<'PY'
          import datetime, pathlib, random
          QUOTES = [
              "Forecasting is easy. Knowing when to stop is the whole problem.",
              "An agent without uncertainty is just a confident hallucinator.",
              "Time series are 80% assumptions and 20% numerics.",
              "If your critic never vetoes, you don't have a critic.",
              "Belief is what you carry between two pieces of evidence.",
              "Every protocol is a contract against future you.",
              "A Pareto frontier is honest if it has zero points on it.",
              "Drift is the model's autobiography.",
              "Reviewers don't kill papers — unclear papers kill themselves.",
              "The harness is the product. The model is replaceable.",
              "Stop discipline is the only metric that compounds.",
              "An evidence theory that can't be falsified is a vibe.",
              "The dev branch is the only place I tell the truth.",
              "Make the next agent's job easier. They will be you, tired.",
              "Confidence without calibration is just noise with branding.",
          ]
          today = datetime.date.today()
          seed  = today.year * 10000 + today.month * 100 + today.day
          rng   = random.Random(seed)
          quote = rng.choice(QUOTES)
          block = (
              f"<!-- quote-of-the-day:{today.isoformat()} -->\n"
              f"> 💬 _{quote}_\n\n"
              f"_Last refreshed: {today.isoformat()} (Australia/Melbourne)_"
          )
          pathlib.Path(".github/quote.md").write_text(block)
          readme = pathlib.Path("README.md").read_text()
          anchor = "<!-- QUOTE-OF-THE-DAY -->"
          if anchor in readme:
              pre, _, post = readme.partition(anchor)
              readme = pre + anchor + "\n" + block + "\n" + post
          pathlib.Path("README.md").write_text(readme)
          print(block)
          PY

      - name: Commit
        run: |
          git config user.name "ztxtech-bot"
          git config user.email "bot@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore(quote): daily quote rotation"
          git push
